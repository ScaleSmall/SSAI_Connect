name: Update shared package

on:
  repository_dispatch:
    types: [shared-updated]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update ssai-shared to latest
        run: |
          npm install github:ScaleSmall/SSAI_Shared --save
          
      - name: Commit and push if changed
        run: |
          git config user.name "ScaleSmall Bot"
          git config user.email "admin@scalesmall.ai"
          git add package.json package-lock.json 2>/dev/null || true
          git diff --cached --quiet || (git commit -m "chore: update ssai-shared to ${{ github.event.client_payload.ref }}" && git push)
