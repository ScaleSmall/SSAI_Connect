name: Update shared package

on:
  repository_dispatch:
    types: [shared-updated]

concurrency:
  group: update-shared
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.SCALESMALL_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Configure git auth for private packages
        run: git config --global url."https://${{ secrets.SCALESMALL_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Update ssai-shared to latest
        run: npm install github:ScaleSmall/SSAI_Shared --save

      - name: Commit and push if changed
        run: |
          git config user.name "ScaleSmall Bot"
          git config user.email "admin@scalesmall.ai"
          git add package.json package-lock.json 2>/dev/null || true
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update ssai-shared to ${{ github.event.client_payload.ref }}"
          git pull --rebase origin main
          git push
